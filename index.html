<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>盤點清冊查詢系統</title>
<!-- 引入 Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- 引入 SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
  body{
    font-family:"微軟正黑體",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:#f7f7f7; margin:0; padding:30px 0;
  }
  .main-wrapper{ width:1200px; max-width:100%; margin:0 auto; }
  .container{
    background:#fff; border-radius:16px; box-shadow:0 10px 26px rgba(0,0,0,.08);
    padding:24px 24px 32px; padding-bottom:max(32px, env(safe-area-inset-bottom));
  }
  h1{
    font-size:48px; text-align:center; margin:8px 0 16px; letter-spacing:1px;
    background:linear-gradient(90deg,#1565c0,#42a5f5); -webkit-background-clip:text;
    background-clip:text; color:transparent; font-weight:900;
  }

  /* ===== 查詢表單 ===== */
  .form{
    display:grid; grid-template-columns:140px 1fr; gap:10px 14px; align-items:center;
    margin-top:6px;
    width:720px; max-width:100%;
    margin-left:auto; margin-right:auto;
  }
  .label{
    justify-self:end; text-align:right;
    font-size:26px; color:#444;
  }
  .field{
    display:flex; align-items:center; justify-content:center;
  }
  .in{
    width:520px; max-width:100%;
    font-size:26px; padding:10px 12px;
    border:2px solid #cfd8dc; border-radius:10px;
    text-align:center; outline:none; background:#fff;
  }
  .in:focus{ border-color:#42a5f5; box-shadow:0 0 0 4px rgba(66,165,245,.15); }
  select.in{ height: 48px; width: 550px; }

  .btn-row{
    display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; justify-content:center;
  }
  .btn{
    min-width:120px; padding:10px 14px; font-size:26px; border:none; border-radius:12px;
    cursor:pointer; color:#fff; transition:transform .05s ease, box-shadow .2s ease;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
  }
  .btn:active{ transform:translateY(1px); }
  .btn-green{ background:#2e7d32; } .btn-green:hover{ box-shadow:0 6px 16px rgba(46,125,50,.35); }
  .btn-red{ background:#c62828; }   .btn-red:hover{ box-shadow:0 6px 16px rgba(198,40,40,.35); }

  /* 小按鈕 */
  .btn-mini{
    font-size:18px; padding:6px 10px;
    border:none; border-radius:10px; cursor:pointer;
    color:#fff; margin:6px 4px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
  }
  .btn-mini:active{ transform:translateY(1px); }
  .btn-pink{ background:#ec407a; }   .btn-pink:hover{ box-shadow:0 6px 16px rgba(236,64,122,.35); }
  .btn-yellow{ background:#f9a825; } .btn-yellow:hover{ box-shadow:0 6px 16px rgba(249,168,37,.35); }

  /* ===== 結果卡 ===== */
  .result-card{
    margin-top:16px; background:#fffde7; border:1px solid #ffe082;
    border-radius:12px; padding:14px; box-shadow:0 6px 18px rgba(255,193,7,.12);
  }
  .result-title{
    font-size:28px; font-weight:800; color:#f57f17; margin:4px 4px 10px; letter-spacing:1px;
    display:flex; align-items:center; gap:8px;
  }
  .result-title::before{ content:""; width:10px; height:10px; border-radius:50%; background:#ffca28; }
  .result-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .table{  min-width: 980px; width:100%; border-collapse:collapse; table-layout:fixed; font-size:20px; }
  .table thead th{
    background:linear-gradient(90deg,#fbc02d,#ffd54f); color:#3e2723; font-weight:800;
    padding:10px 12px; text-align:center; font-size:18px;
  }
  .table td{
    border:1px solid #ffe082; padding:10px 12px; text-align:center; vertical-align:middle;
    word-break:break-word; white-space:normal;font-size:16px;
  }
  .table tbody tr:nth-child(odd){ background:#fff; }
  .table tbody tr:nth-child(even){ background:#fffef4; }
  
  .table col.col-a { width: 120px; }
  .table col.col-b { width: 240px; }
  .table col.col-c { width: 100px; }
  .table col.col-f { width: 120px; }
  .table col.col-g { width: 110px; }
  .table col.col-h { width: 100px; }
  .table col.col-i { width: 140px; }
  .table col.col-j { width: 140px; }
  .table col.col-k { width: 90px;  }
  .table col.col-l { width: 100px; }

  /* ===== 登入遮罩 ===== */
  #loginOverlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    z-index: 99999; /* 最上層 */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: #fff;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-align: center;
  }
  .login-box h2 {
    margin-top: 0;
    color: #1565c0;
    margin-bottom: 10px;
  }
  .login-box p {
    color: #555;
    margin-bottom: 24px;
  }

  /* 手機 RWD */
  @media (max-width: 1000px){
    .container{ padding-left: 10px; padding-right: 10px; border-radius: 0; }
    .form{ grid-template-columns: 96px 1fr; width: 100%; }
    .field{ justify-content: stretch; }
    .in{ width: 100% !important; height: 46px; font-size: 20px; }
    select.in{ width: 100% !important; height: 46px; }
    .result-wrap{ overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table{ min-width: 980px; }
  }
  @media (max-width:900px){
    .container{ padding:16px; border-radius:12px; }
    h1{ font-size:32px; }
    .form{ grid-template-columns:110px 1fr; width:100%; }
    .in{ width:100%; font-size:20px; height:46px; }
  }
</style>
</head>
<body>

<!-- 登入遮罩 -->
<div id="loginOverlay">
  <div class="login-box">
    <h2>盤點系統登入</h2>
    <p>請使用有權限的 Google 帳號登入系統</p>
    <!-- Google 登入按鈕容器 -->
    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="left">
    </div>
  </div>
</div>

<div class="main-wrapper">
  <div class="container">
    <h1>盤點清冊查詢系統</h1>

    <!-- 查詢表單 -->
    <section class="form" id="qryForm" aria-label="查詢條件">
      <div class="label">編號</div>
      <div class="field"><input id="qA" class="in" placeholder="輸入關鍵字" /></div>

      <div class="label">名稱</div>
      <div class="field"><input id="qB" class="in" placeholder="輸入關鍵字" /></div>

      <div class="label">地點</div>
      <div class="field"><input id="qI" class="in" placeholder="輸入關鍵字" /></div>

      <div class="label">條碼</div>
      <div class="field"><input id="qJ" class="in" placeholder="輸入關鍵字" /></div>

      <div class="label">比對</div>
      <div class="field">
        <select id="qK" class="in">
          <option value=""></option>
        </select>
      </div>
    </section>

    <div class="btn-row">
      <button class="btn btn-green" id="btnQuery">🔎 查詢</button>
      <button class="btn btn-red" id="btnClear">🧹 清除</button>
    </div>

    <!-- 結果區 -->
    <section id="resultCard" class="result-card" style="display:none;">
      <div class="result-title">查詢結果</div>
      <div class="result-wrap">
        <table id="resultTable" class="table" aria-label="查詢結果表格">
          <colgroup>
            <col style="width:120px;">
            <col style="width:100px;">
            <col style="width:60px;">
            <col style="width:70px;">
            <col style="width:100px;">
            <col style="width:120px;">
            <col style="width:100px;">
            <col style="width:125px;">
            <col style="width:60px;">
            <col style="width:90px;">
            <col style="width:120px;"> <!-- 處理 -->
          </colgroup>
          <thead>
            <tr>
              <th>編號</th><th>名稱</th><th>單位</th><th>總價</th><th>購置</th>
              <th>年限</th><th>地點</th><th>條碼</th><th>比對</th><th>狀態</th>
              <th>處理</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>
</div>

<script>
/* ================= 設定區 ================= */
const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com'; // ★ 請填入你的 Client ID
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbz9Il_sTz9LeC-eq3rWmP21FxmrpOlx0JFOLl8H--y5JWJQF4YEESjqUqk0V5QFLNGiXA/exec'; // 原本查詢的 API
const AUTH_API_URL = 'https://script.google.com/macros/s/AKfycbxBnPl_7XPedBwlk4pL3jYHwXteRd2SNegY24QLp6jGVvxCQDgRTXTu1XhF2rcaGh_mIw/exec'; // 驗證白名單的 API

/* ================= 雙認證與白名單邏輯 ================= */
// 1. 解析 Google 回傳的 JWT Token 以取得 Email
function decodeJwtResponse(token) {
  let base64Url = token.split('.')[1];
  let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
  return JSON.parse(jsonPayload);
}

// 2. Google 登入完成後的回呼函式
async function handleCredentialResponse(response) {
  const responsePayload = decodeJwtResponse(response.credential);
  const userEmail = responsePayload.email;

  // 顯示驗證中的 SweetAlert2 動畫
  Swal.fire({
    title: '身分驗證中',
    text: `正在驗證 ${userEmail} 是否具有權限...`,
    allowOutsideClick: false,
    didOpen: () => {
      Swal.showLoading();
    }
  });

  try {
    const authRes = await fetch(AUTH_API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: "verifyLogin", email: userEmail }),
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      redirect: 'follow'
    });

    if (!authRes.ok) throw new Error("驗證伺服器無回應");
    
    const data = await authRes.json();

    if (data.status === 'success' && data.authorized === true) {
      // 驗證成功
      Swal.fire({
        icon: 'success',
        title: '登入成功',
        text: '歡迎進入盤點系統',
        timer: 1500,
        showConfirmButton: false
      });
      // 隱藏遮罩，允許操作網頁
      document.getElementById('loginOverlay').style.display = 'none';
      // 載入下拉選單並聚焦
      loadCompareOptions();
      qA.focus();
    } else {
      // 驗證失敗 (不在白名單)
      Swal.fire({
        icon: 'error',
        title: '權限不足',
        text: '您不在白名單中，無權訪問此系統。',
        confirmButtonText: '確定'
      });
      // 遮罩保留，不讓使用者進入
    }
  } catch (error) {
    Swal.fire({
      icon: 'error',
      title: '網路錯誤',
      text: '無法連接到驗證伺服器，請稍後再試。',
      confirmButtonText: '確定'
    });
    console.error("Auth API Error:", error);
  }
}


/* ================= 工具：API 呼叫 ================= */
async function callApi(action, params = null) {
  try {
    const response = await fetch(GAS_API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: action, params: params }),
      redirect: 'follow'
    });
    
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    return await response.json();
  } catch (e) {
    console.error("API Error:", e);
    throw e;
  }
}

/* ===== SweetAlert2 封裝取代舊的 Toast 和 Progress ===== */
function showToast(msg, type='success'){
  Swal.fire({
    toast: true,
    position: 'top-end',
    icon: type,
    title: msg,
    showConfirmButton: false,
    timer: 2000,
    timerProgressBar: true
  });
}

function showProgress(msg = '處理中...'){
  Swal.fire({
    title: msg,
    allowOutsideClick: false,
    didOpen: () => { Swal.showLoading(); }
  });
}

function finishProgress(){
  Swal.close();
}

/* ===== DOM ===== */
const qA=document.getElementById('qA');
const qB=document.getElementById('qB');
const qI=document.getElementById('qI');
const qJ=document.getElementById('qJ');
const qK=document.getElementById('qK');
const btnQuery=document.getElementById('btnQuery');
const resultCard=document.getElementById('resultCard');
const resultBody=document.querySelector('#resultTable tbody');

/* ===== 功能 ===== */
function clearFormAndResult(){
  qA.value=''; qB.value=''; qI.value=''; qJ.value=''; qK.value='';
  resultBody.innerHTML=''; resultCard.style.display='none';
}

function _allEmpty(){
  return ![qA,qB,qI,qJ].some(el => (el.value||'').trim()) && !(qK.value||'').trim();
}

function renderRows(rows){
  resultBody.innerHTML='';
  if(!rows || rows.length===0){
    resultCard.style.display='none';
    showToast('沒有符合的資料', 'info');
    return;
  }
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    // 依序：A,B,C,F,G,H,I,J,K,L
    ['A','B','C','F','G','H','I','J','K','L'].forEach(k=>{
      const td=document.createElement('td');
      td.textContent=r[k]??'';
      tr.appendChild(td);
    });

    // 處理欄
    const tdAct=document.createElement('td');
    tdAct.innerHTML = `
      <button class="btn-mini btn-pink"   onclick="doDiscard('${r.J}')">報廢</button>
      <button class="btn-mini btn-yellow" onclick="undoDiscard('${r.J}')">取消</button>
    `;
    tr.appendChild(tdAct);

    resultBody.appendChild(tr);
  });
  resultCard.style.display='block';
}

/* 查詢功能 */
async function runQuery(){
  if (_allEmpty()){
    showToast('請至少輸入／選擇一個查詢條件', 'error');
    qA.focus();
    return;
  }

  resultBody.innerHTML=''; resultCard.style.display='none';
  showProgress('資料查詢中...'); 
  btnQuery.disabled=true; btnQuery.style.opacity=.7;

  const payload={
    A:(qA.value||'').trim(),
    B:(qB.value||'').trim(),
    I:(qI.value||'').trim(),
    J:(qJ.value||'').trim(),
    K:(qK.value||'').trim()
  };

  try {
    const res = await callApi('searchAssets', payload);
    finishProgress();
    renderRows(res && res.rows || []);
  } catch (err) {
    console.error(err);
    finishProgress();
    Swal.fire('查詢失敗', '請檢查網路連線或 GAS 權限設定', 'error');
  } finally {
    btnQuery.disabled=false; btnQuery.style.opacity=1;
  }
}

/* ===== 事件 ===== */
btnQuery.addEventListener('click', runQuery);
document.getElementById('btnClear').addEventListener('click', ()=>{
  clearFormAndResult(); 
  showToast('已清除條件', 'success');
});
[qA,qB,qI,qJ].forEach(el=>{
  el.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); runQuery(); }});
});

/* 輔助：找行 */
function _findRowByBarcode(barcode){
  const rows = Array.from(resultBody.querySelectorAll('tr'));
  return rows.find(tr => (tr.children[7]?.textContent || '') === barcode) || null;
}

/* 報廢功能 */
async function doDiscard(barcode){
  const tr=_findRowByBarcode(barcode);
  if(!tr){ showToast('找不到該筆資料', 'error'); return; }
  const kCell = tr.children[8]; 
  const kVal  = (kCell.textContent||'').trim();

  if(kVal === '1'){ showToast('此設備已進入報廢流程', 'info'); return; }

  showProgress('正在標記報廢...');
  
  try {
    const res = await callApi('markDiscard', { barcode: barcode }); // 明確傳遞物件
    finishProgress();
    if(res && res.ok){
      tr.children[8].textContent = res.K ?? '1';
      tr.children[9].textContent = res.L ?? '報廢';
      showToast('已成功標記報廢', 'success');
    } else if(res && res.already){
      showToast('此設備已進入報廢流程', 'info');
    } else {
      Swal.fire('處理失敗', '後端伺服器回報錯誤', 'error');
    }
  } catch (err) {
    console.error(err);
    finishProgress();
    Swal.fire('連線錯誤', '無法連接伺服器', 'error');
  }
}

/* 取消報廢功能 */
async function undoDiscard(barcode){
  const tr=_findRowByBarcode(barcode);
  if(!tr){ showToast('找不到該筆資料', 'error'); return; }
  const kCell = tr.children[8];
  const kVal  = (kCell.textContent||'').trim();

  if(kVal === '0' || kVal === ''){ showToast('此設備目前沒有報廢', 'info'); return; }

  showProgress('正在取消報廢...');
  
  try {
    const res = await callApi('cancelDiscard', { barcode: barcode });
    finishProgress();
    if(res && res.ok){
      tr.children[8].textContent = res.K ?? '0';
      tr.children[9].textContent = res.L ?? '使用中';
      showToast('已取消報廢', 'success');
    } else if(res && res.notFound){
      showToast('此設備目前沒有報廢', 'info');
    } else {
      Swal.fire('處理失敗', '後端伺服器回報錯誤', 'error');
    }
  } catch(err) {
    console.error(err);
    finishProgress();
    Swal.fire('連線錯誤', '無法連接伺服器', 'error');
  }
}

/* 初始化：載入下拉 */
async function loadCompareOptions(){
  try {
    const res = await callApi('getCompareOptions');
    const list=(res && res.options)||[];
    qK.innerHTML='<option value=""></option>' + list.map(v=>`<option value="${v}">${v}</option>`).join('');
  } catch(e) {
    console.log("載入下拉失敗，忽略", e);
  }
}

// 註：window.onload 現在移除自動執行 loadCompareOptions，改為登入成功後才執行
</script>
</body>
</html>
