<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>盤點清冊查詢系統 v1.3.0</title>
<!-- 目前版本：v1.3.0  -->

<!-- 引入 Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- 引入 SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
  :root {
    --primary-color: #1565c0;
    --secondary-color: #42a5f5;
    --success-color: #2e7d32;
    --danger-color: #c62828;
    --bg-color: #f7f7f7;
  }

  body {
    font-family: "微軟正黑體", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: var(--bg-color);
    margin: 0;
    padding: 30px 0;
  }

  .main-wrapper {
    width: 1200px;
    max-width: 100%;
    margin: 0 auto;
    position: relative;
  }

  /* 頂部導覽列 (顯示使用者與登出) */
  .top-bar {
    display: none; /* 登入後顯示 */
    justify-content: flex-end;
    align-items: center;
    padding: 0 20px 15px;
    gap: 15px;
  }

  .user-info {
    font-size: 14px;
    color: #555;
    background: #e3f2fd;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid #bbdefb;
  }

  .btn-logout {
    background: #fff;
    border: 1px solid #ef5350;
    color: #ef5350;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.2s;
  }

  .btn-logout:hover {
    background: #ef5350;
    color: #fff;
  }

  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 26px rgba(0,0,0,.08);
    padding: 24px 24px 32px;
    padding-bottom: max(32px, env(safe-area-inset-bottom));
  }

  h1 {
    font-size: 48px;
    text-align: center;
    margin: 8px 0 4px;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 900;
  }

  .version-tag {
    text-align: center;
    font-size: 14px;
    color: #999;
    margin-bottom: 20px;
    font-family: monospace;
  }

  /* ===== 登入遮罩 Overlay ===== */
  #loginOverlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(10px);
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-box {
    background: #fff;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    text-align: center;
    width: 380px;
    max-width: 90%;
  }

  .login-box h2 {
    margin-top: 0;
    color: var(--primary-color);
    margin-bottom: 10px;
  }

  .login-box p {
    color: #666;
    font-size: 15px;
    margin-bottom: 30px;
  }

  .google-btn-wrapper {
    display: flex;
    justify-content: center;
    margin: 20px 0;
  }

  /* ===== 查詢表單 ===== */
  .form {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 10px 14px;
    align-items: center;
    margin-top: 6px;
    width: 720px;
    max-width: 100%;
    margin-left: auto;
    margin-right: auto;
  }

  .label { justify-self: end; text-align: right; font-size: 26px; color: #444; }
  .in {
    width: 100%; max-width: 520px; font-size: 26px; padding: 10px 12px;
    border: 2px solid #cfd8dc; border-radius: 10px; text-align: center;
    outline: none; background: #fff; box-sizing: border-box;
  }
  .in:focus { border-color: var(--secondary-color); box-shadow: 0 0 0 4px rgba(66,165,245,.15); }
  select.in { height: 54px; }

  .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
  .btn {
    min-width: 140px; padding: 12px 20px; font-size: 26px; border: none;
    border-radius: 12px; cursor: pointer; color: #fff;
    transition: transform .05s ease, box-shadow .2s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .btn:active { transform: translateY(1px); }
  .btn-green { background: var(--success-color); }
  .btn-red { background: var(--danger-color); }

  /* ===== 結果卡片 ===== */
  .result-card {
    margin-top: 20px; background: #fffde7; border: 1px solid #ffe082;
    border-radius: 12px; padding: 14px; box-shadow: 0 6px 18px rgba(255,193,7,.12);
    display: none;
  }
  .result-title { font-size: 28px; font-weight: 800; color: #f57f17; margin-bottom: 15px; }
  .result-wrap { overflow-x: auto; }
  .table { width: 100%; min-width: 1000px; border-collapse: collapse; font-size: 18px; }
  .table th { background: linear-gradient(90deg, #fbc02d, #ffd54f); color: #3e2723; padding: 12px; border: 1px solid #ffe082; }
  .table td { border: 1px solid #ffe082; padding: 10px; text-align: center; background: #fff; }

  .btn-mini { padding: 6px 12px; font-size: 16px; border-radius: 8px; border: none; color: #fff; cursor: pointer; margin: 2px; }
  .btn-pink { background: #ec407a; }
  .btn-yellow { background: #f9a825; }

  @media (max-width: 900px) {
    h1 { font-size: 32px; }
    .form { grid-template-columns: 100px 1fr; }
    .label, .in, .btn { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- 登入遮罩 -->
<div id="loginOverlay">
  <div class="login-box">
    <h2>系統安全驗證</h2>
    <p>使用 Google 帳號登入 </p>
    
    <div class="google-btn-wrapper">
      <div id="g_id_onload"
           data-client_id="553016940521-araovlp30ctbqn6um5rr49q3es5jm4jg.apps.googleusercontent.com"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="onGoogleSignIn"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_blue" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
    </div>
  </div>
</div>

<div class="main-wrapper">
  <!-- 頂部資訊列 -->
  <div class="top-bar" id="topBar">
    <div class="user-info" id="displayUserEmail">user@gmail.com</div>
    <button class="btn-logout" onclick="logout()">登出系統</button>
  </div>

  <div class="container">
    <h1>盤點清冊查詢系統</h1>
    <div class="version-tag">Version 1.3.0 (Token Auth)</div>

    <section class="form">
      <div class="label">編號</div><div class="field"><input id="qA" class="in" placeholder="關鍵字"></div>
      <div class="label">名稱</div><div class="field"><input id="qB" class="in" placeholder="關鍵字"></div>
      <div class="label">地點</div><div class="field"><input id="qI" class="in" placeholder="關鍵字"></div>
      <div class="label">條碼</div><div class="field"><input id="qJ" class="in" placeholder="條碼號"></div>
      <div class="label">比對</div>
      <div class="field">
        <select id="qK" class="in"><option value=""></option></select>
      </div>
    </section>

    <div class="btn-row">
      <button class="btn btn-green" onclick="runQuery()">🔎 查詢</button>
      <button class="btn btn-red" onclick="clearForm()">🧹 清除</button>
    </div>

    <section id="resultCard" class="result-card">
      <div class="result-title">查詢結果</div>
      <div class="result-wrap">
        <table class="table" id="resultTable">
          <thead>
            <tr>
              <th>編號</th><th>名稱</th><th>單位</th><th>總價</th><th>購置</th>
              <th>年限</th><th>地點</th><th>條碼</th><th>比對</th><th>狀態</th>
              <th>處理</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>
</div>

<script>
/* ================= 系統設定 ================= */
// 替換為你重新部署後的 GAS API URL (重要：修改程式碼後請發布「新增部署作業」)
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbz9Il_sTz9LeC-eq3rWmP21FxmrpOlx0JFOLl8H--y5JWJQF4YEESjqUqk0V5QFLNGiXA/exec'; 

/* ================= 網頁載入與驗證邏輯 ================= */

window.onload = function() {
  const sessionToken = localStorage.getItem('inventory_session_token');
  const userEmail = localStorage.getItem('inventory_user_email');
  
  if (sessionToken && userEmail) {
    // 已有 Token，進入系統 (若 Token 伺服器端過期，會在發送 API 時被擋下)
    enterSystem(userEmail);
  }
};

// Google 登入回呼 (將 JWT 交給後端驗證，取代前端土法煉鋼)
async function onGoogleSignIn(response) {
  const jwtToken = response.credential;
  
  Swal.fire({ title: '安全驗證中...', text: '正在核對數位簽章與授權金鑰', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

  try {
    const res = await fetch(GAS_API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'verifyLogin', params: { idToken: jwtToken } }),
      redirect: 'follow'
    });
    
    if (!res.ok) throw new Error("伺服器回應異常");
    const data = await res.json();

    if (data.status === 'success' && data.authorized) {
      // 驗證成功，後端核發 Session Token
      localStorage.setItem('inventory_session_token', data.sessionToken);
      localStorage.setItem('inventory_user_email', data.email);
      
      Swal.fire({ icon: 'success', title: '驗證通過', text: '歡迎進入系統', timer: 1500, showConfirmButton: false });
      enterSystem(data.email);
    } else {
      Swal.fire('驗證失敗', data.message || '無權限訪問', 'error');
    }
  } catch (e) {
    console.error(e);
    Swal.fire('連線錯誤', '無法連接驗證伺服器', 'error');
  }
}

// 進入系統 UI 切換
function enterSystem(email) {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('topBar').style.display = 'flex';
  document.getElementById('displayUserEmail').innerText = email;
  loadCompareOptions();
}

// 登出系統
async function logout() {
  const confirm = await Swal.fire({
    title: '確定要登出嗎？',
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#d33',
    cancelButtonColor: '#3085d6',
    confirmButtonText: '登出',
    cancelButtonText: '取消'
  });

  if (confirm.isConfirmed) {
    showProgress('正在登出系統...');
    // 通知後端銷毀 Token (非強制，但符合資安原則)
    try {
      await callApi('logout'); 
    } catch(e) {} // 即使連線失敗也強制清除前端狀態

    localStorage.removeItem('inventory_session_token');
    localStorage.removeItem('inventory_user_email');
    location.reload(); // 重新載入頁面回到登入畫面
  }
}

/* ================= 系統主要功能邏輯 ================= */

// 共用呼叫 API (自動夾帶 Session Token)
async function callApi(action, params = {}) {
  const token = localStorage.getItem('inventory_session_token');
  if (!token) {
    handleSessionExpired();
    throw new Error('No session token');
  }

  // 將 token 混入參數中送給後端驗證
  params.sessionToken = token;

  try {
    const response = await fetch(GAS_API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: action, params: params }),
      redirect: 'follow'
    });
    
    const data = await response.json();
    
    // 攔截後端回傳的授權失敗 (Token 過期或無效)
    if (data.status === 'unauthorized') {
      handleSessionExpired(data.message);
      throw new Error('Unauthorized');
    }
    
    return data;
  } catch (e) {
    console.error("API Error:", e);
    throw e;
  }
}

// 處理連線逾時/Token無效
function handleSessionExpired(msg = '登入時效已過，請重新登入') {
  finishProgress();
  localStorage.removeItem('inventory_session_token');
  localStorage.removeItem('inventory_user_email');
  Swal.fire({
    icon: 'warning',
    title: '授權失效',
    text: msg,
    confirmButtonText: '重新登入',
    allowOutsideClick: false
  }).then(() => {
    location.reload();
  });
}

function showToast(msg, icon='success') {
  Swal.fire({ toast: true, position: 'top-end', icon: icon, title: msg, showConfirmButton: false, timer: 2000 });
}
function showProgress(msg = '處理中...') {
  Swal.fire({ title: msg, allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
}
function finishProgress() { Swal.close(); }

// 清除表單
function clearForm() {
  ['qA','qB','qI','qJ','qK'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('resultCard').style.display = 'none';
  document.querySelector('#resultTable tbody').innerHTML = '';
  showToast('已清除條件');
}

// 執行查詢
async function runQuery() {
  const payload = {
    A: document.getElementById('qA').value.trim(),
    B: document.getElementById('qB').value.trim(),
    I: document.getElementById('qI').value.trim(),
    J: document.getElementById('qJ').value.trim(),
    K: document.getElementById('qK').value.trim()
  };

  if (!payload.A && !payload.B && !payload.I && !payload.J && !payload.K) {
    Swal.fire('提示', '請至少輸入一個查詢條件', 'warning');
    return;
  }

  showProgress('資料查詢中...');
  try {
    const res = await callApi('searchAssets', payload);
    finishProgress();
    renderRows(res.rows || []);
  } catch (err) {
    if(err.message !== 'Unauthorized') {
      finishProgress();
      Swal.fire('查詢失敗', '無法連接伺服器或發生錯誤', 'error');
    }
  }
}

// 渲染表格資料
function renderRows(rows) {
  const tbody = document.querySelector('#resultTable tbody');
  tbody.innerHTML = '';
  
  if (!rows || rows.length === 0) {
    document.getElementById('resultCard').style.display = 'none';
    Swal.fire('查無資料', '找不到符合條件的資產', 'info');
    return;
  }
  
  rows.forEach(r => {
    const tr = document.createElement('tr');
    ['A','B','C','F','G','H','I','J','K','L'].forEach(k => {
      const td = document.createElement('td');
      td.textContent = r[k] ?? '';
      tr.appendChild(td);
    });

    const tdAct = document.createElement('td');
    const isDiscarded = (r.K === '1' || r.K === 1 || (r.L && r.L.includes('報廢')));

    const btnDiscard = isDiscarded 
      ? `<button class="btn-mini" style="background:#cfd8dc; color:#78909c; cursor:not-allowed; box-shadow:none;" disabled>報廢</button>`
      : `<button class="btn-mini btn-pink" onclick="doAction('${r.J}', 'markDiscard')">報廢</button>`;
      
    const btnCancel = !isDiscarded
      ? `<button class="btn-mini" style="background:#cfd8dc; color:#78909c; cursor:not-allowed; box-shadow:none;" disabled>取消</button>`
      : `<button class="btn-mini btn-yellow" onclick="doAction('${r.J}', 'cancelDiscard')">取消</button>`;

    tdAct.innerHTML = btnDiscard + btnCancel;
    tr.appendChild(tdAct);
    tbody.appendChild(tr);
  });
  
  document.getElementById('resultCard').style.display = 'block';
}

// 報廢與取消報廢共用函式
async function doAction(barcode, action) {
  showProgress('處理中...');
  try {
    const res = await callApi(action, { barcode: barcode });
    finishProgress();
    if (res && res.ok) {
      showToast('處理成功');
      runQuery(); // 重新整理表格
    } else if (res && res.already) {
      showToast('此設備已進入報廢流程', 'info');
    } else if (res && res.notFound) {
      showToast('操作無效，可能狀態不符', 'warning');
    } else {
      Swal.fire('處理失敗', res.message || '發生未知錯誤', 'error');
    }
  } catch (err) {
    if(err.message !== 'Unauthorized') {
      finishProgress();
      Swal.fire('連線錯誤', '無法連接伺服器', 'error');
    }
  }
}

// 載入下拉選單 (比對狀態)
async function loadCompareOptions() {
  try {
    const res = await callApi('getCompareOptions');
    const sel = document.getElementById('qK');
    sel.innerHTML = '<option value=""></option>' + (res.options || []).map(o => `<option value="${o}">${o}</option>`).join('');
  } catch (e) {
    console.log('載入選單失敗', e);
  }
}

// 綁定 Enter 快捷鍵搜尋
['qA','qB','qI','qJ'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', (e) => {
    if (e.key === 'Enter') runQuery();
  });
});
</script>
</body>
</html>
